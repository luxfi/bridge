# Arbitrum One — Teleport Chain Manifest
# Schema: ../schema.yaml v1.0.0

chain_id: 42161
name: "Arbitrum"
class: evm
tier: bidirectional

signer:
  protocol: cggmp21
  curve: secp256k1
  threshold:
    t: 2
    n: 3

finality:
  mode: block_depth
  confirmations: 64  # L2 blocks, ~16s; wait for L1 batch confirmation
  max_reorg_depth: 128
  stale_attestation_seconds: 86400

assets:
  - ticker: ETH
    decimals: 18
    recipient_encoding: evm_address
    wrapper:
      symbol: LETH
      contract: "liquid/tokens/LETH.sol"
      decimals: 18

  - ticker: ARB
    decimals: 18
    recipient_encoding: evm_address
    wrapper:
      symbol: LARB
      contract: "liquid/tokens/LARB.sol"
      decimals: 18

adapter:
  deposit_method: event_log
  vault_contract: "kms://teleport/arbitrum/teleport-vault"
  teleporter_contract: "kms://teleport/lux-c/teleporter-arb"

watcher:
  plugin: evm_log_watcher
  rpc_url: "kms://teleport/arbitrum/rpc"
  poll_interval_ms: 250
  start_block: 0
