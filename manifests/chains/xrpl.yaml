# XRP Ledger — Teleport Chain Manifest
# Schema: ../schema.yaml v1.0.0
#
# Status: locale_only — CGGMP21 secp256k1 adapter integration pending.

chain_id: 4294967420
name: "XRPL"
class: account_native
tier: locale_only

signer:
  protocol: cggmp21
  curve: secp256k1
  threshold:
    t: 2
    n: 3

finality:
  mode: slot_finalized  # XRPL consensus — ledger validated in ~4s
  confirmations: 1
  max_reorg_depth: 0
  stale_attestation_seconds: 86400

assets:
  - ticker: XRP
    decimals: 6
    recipient_encoding: base58  # r... base58check XRPL addresses
    wrapper:
      symbol: LXRP
      contract: "liquid/tokens/LXRP.sol"
      decimals: 18

adapter:
  deposit_method: account_watch
  vault_contract: "kms://teleport/xrpl/mpc-address"
  teleporter_contract: "kms://teleport/lux-c/teleporter-xrp"

watcher:
  plugin: xrpl_ws_watcher
  rpc_url: "kms://teleport/xrpl/rpc"
  poll_interval_ms: 4000
  start_block: 0
