# Ethereum Mainnet — Teleport Chain Manifest
# Schema: ../schema.yaml v1.0.0

chain_id: 1
name: "Ethereum"
class: evm
tier: yield_enabled

signer:
  protocol: cggmp21
  curve: secp256k1
  threshold:
    t: 2
    n: 3

finality:
  mode: slot_finalized
  confirmations: 64  # ~2 epochs for safe finality
  max_reorg_depth: 128
  stale_attestation_seconds: 86400

assets:
  - ticker: ETH
    decimals: 18
    recipient_encoding: evm_address
    wrapper:
      symbol: LETH
      contract: "liquid/tokens/LETH.sol"
      decimals: 18
    strategy:
      name: LidoStrategy
      contract: "bridge/teleport/strategies/LidoStrategy.sol"

  - ticker: USDC
    decimals: 6
    recipient_encoding: evm_address
    wrapper:
      symbol: LUSD
      contract: "liquid/tokens/LUSD.sol"
      decimals: 18

  - ticker: USDT
    decimals: 6
    recipient_encoding: evm_address
    wrapper:
      symbol: LUSD
      contract: "liquid/tokens/LUSD.sol"
      decimals: 18

  - ticker: DAI
    decimals: 18
    recipient_encoding: evm_address
    wrapper:
      symbol: LUSD
      contract: "liquid/tokens/LUSD.sol"
      decimals: 18

adapter:
  deposit_method: event_log
  vault_contract: "kms://teleport/ethereum/liquid-vault"
  teleporter_contract: "kms://teleport/lux-c/teleporter-eth"

watcher:
  plugin: evm_log_watcher
  rpc_url: "kms://teleport/ethereum/rpc"
  poll_interval_ms: 12000
  start_block: 0
