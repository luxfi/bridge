# Lux Hanzo Chain — Teleport Chain Manifest
# Schema: ../schema.yaml v1.0.0
#
# Hanzo AI L1 subnet on Lux. Uses Warp messaging for native bridging.

chain_id: 36963
name: "Lux Hanzo"
class: lux_native
tier: yield_enabled

signer:
  protocol: bls
  curve: bls12_381
  threshold:
    t: 2
    n: 3
  native_signer:
    protocol: bls
    curve: bls12_381

finality:
  mode: instant
  confirmations: 1
  max_reorg_depth: 0
  stale_attestation_seconds: 86400

assets:
  - ticker: HANZO
    decimals: 18
    recipient_encoding: evm_address
    wrapper:
      symbol: LHANZO
      contract: "liquid/tokens/LHANZO.sol"
      decimals: 18
    strategy:
      name: HanzoStakingStrategy
      contract: "bridge/teleport/strategies/HanzoStakingStrategy.sol"

adapter:
  deposit_method: event_log
  vault_contract: "kms://teleport/lux-hanzo/native-vault"
  teleporter_contract: "kms://teleport/lux-c/teleporter-hanzo"

watcher:
  plugin: lux_warp_watcher
  rpc_url: "kms://teleport/lux-hanzo/rpc"
  poll_interval_ms: 2000
  start_block: 0
