name: Build and Push Images

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'app/server/**'
      - 'app/bridge/**'
      - 'pkg/**'
      - 'contracts/**'
      - 'opnet-watcher/**'
      - '.github/workflows/build-and-push.yml'
      - 'Dockerfile*'
      - '.npmrc'
      - 'pnpm-workspace.yaml'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/luxfi

jobs:
  build-ui:
    name: Build Bridge UI
    runs-on: lux-build-linux-amd64
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_PREFIX }}/bridge-ui
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Create production .env
      run: |
        printf '%s\n' \
          'NEXT_PUBLIC_BRIDGE_API=https://bridge-api.lux.network' \
          'NEXT_PUBLIC_BACKEND_API=https://bridge-api.lux.network' \
          'NEXT_PUBLIC_IDENTITY_API=https://bridge-api.lux.network' \
          'NEXT_PUBLIC_EXPLORER_API=https://bridge-api.lux.network' \
          'NEXT_PUBLIC_NETWORK_NAME=mainnet' \
          > app/bridge/.env

    - name: Build and push UI
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./app/bridge/Dockerfile
        platforms: linux/amd64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/bridge-ui:buildcache
        cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}/bridge-ui:buildcache,mode=max
        provenance: false

  build-server:
    name: Build Bridge Server
    runs-on: lux-build-linux-amd64
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_PREFIX }}/bridge-server
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Server
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./app/server/Dockerfile
        platforms: linux/amd64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/bridge-server:buildcache
        cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}/bridge-server:buildcache,mode=max
        provenance: false

  build-opnet-watcher:
    name: Build OPNET Watcher
    runs-on: lux-build-linux-amd64
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_PREFIX }}/opnet-watcher
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push OPNET Watcher
      uses: docker/build-push-action@v5
      with:
        context: ./opnet-watcher
        file: ./opnet-watcher/Dockerfile
        platforms: linux/amd64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/opnet-watcher:buildcache
        cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}/opnet-watcher:buildcache,mode=max
        provenance: false

  contract-conformance:
    name: Teleport contract conformance
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        repository: luxfi/standard
        path: standard
        submodules: recursive
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@v1
      with:
        version: stable

    - name: Teleport conformance tests
      working-directory: standard
      run: forge test --match-contract TeleportConformance -vvv

    - name: OPNET conformance tests
      working-directory: standard
      run: forge test --match-contract OPNETConformance -vvv

  deploy:
    name: Deploy to lux-k8s
    runs-on: lux-build-linux-amd64
    needs: [build-ui, build-server, build-opnet-watcher, contract-conformance]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: read

    steps:
    - name: Fetch deploy credentials from KMS
      id: kms
      env:
        KMS_CLIENT_ID: ${{ secrets.KMS_CLIENT_ID }}
        KMS_CLIENT_SECRET: ${{ secrets.KMS_CLIENT_SECRET }}
        HANZO_API_KEY: ${{ secrets.HANZO_API_KEY }}
        KMS_ENDPOINT: ${{ vars.KMS_ENDPOINT || 'https://kms.hanzo.ai' }}
      run: |
        # Auth: Universal Auth (preferred) or legacy API key
        if [ -n "${KMS_CLIENT_ID}" ] && [ -n "${KMS_CLIENT_SECRET}" ]; then
          HANZO_API_KEY=$(curl -sf "${KMS_ENDPOINT}/api/v1/auth/universal-auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"clientId\":\"${KMS_CLIENT_ID}\",\"clientSecret\":\"${KMS_CLIENT_SECRET}\"}" | jq -r '.accessToken')
        fi
        response=$(curl -sf "${KMS_ENDPOINT}/api/v3/secrets/raw?workspaceId=e1359bf4-31b4-4dfa-bb90-323e2c298ad8&secretPath=/deploy&environment=prod" \
          -H "Authorization: Bearer ${HANZO_API_KEY}" 2>/dev/null || echo "")
        if [ -n "$response" ]; then
          token=$(echo "$response" | jq -r '.secrets[] | select(.secretKey=="DO_API_TOKEN") | .secretValue // empty')
        fi
        if [ -z "${token:-}" ]; then
          echo "::error::Deploy credentials not found. Set HANZO_API_KEY with KMS access."
          exit 1
        fi
        echo "::add-mask::${token}"
        echo "token=${token}" >> "$GITHUB_OUTPUT"

    - name: Install doctl
      uses: digitalocean/action-doctl@v2
      with:
        token: ${{ steps.kms.outputs.token }}

    - name: Install kubectl
      run: |
        mkdir -p $HOME/bin
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl && mv kubectl $HOME/bin/kubectl
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Configure kubectl
      run: doctl kubernetes cluster kubeconfig save lux-k8s --expiry-seconds 600

    - name: Restart bridge deployments
      run: |
        kubectl rollout restart deployment/bridge-ui -n lux-bridge
        kubectl rollout restart deployment/bridge-server -n lux-bridge
        kubectl rollout restart deployment/opnet-watcher -n lux-bridge
        kubectl rollout status deployment/bridge-ui -n lux-bridge --timeout=300s
        kubectl rollout status deployment/bridge-server -n lux-bridge --timeout=300s
        kubectl rollout status deployment/opnet-watcher -n lux-bridge --timeout=300s
