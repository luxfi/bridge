name: Build and Push Images

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'app/server/**'
      - 'app/bridge/**'
      - 'pkg/**'
      - 'contracts/**'
      - '.github/workflows/build-and-push.yml'
      - 'Dockerfile*'
      - '.npmrc'
      - 'pnpm-workspace.yaml'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/luxfi

jobs:
  build-ui:
    name: Build Bridge UI
    runs-on: lux-build
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_PREFIX }}/bridge-ui
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Create production .env
      run: |
        printf '%s\n' \
          'NEXT_PUBLIC_BRIDGE_API=https://bridge-api.lux.network' \
          'NEXT_PUBLIC_BACKEND_API=https://bridge-api.lux.network' \
          'NEXT_PUBLIC_IDENTITY_API=https://bridge-api.lux.network' \
          'NEXT_PUBLIC_EXPLORER_API=https://bridge-api.lux.network' \
          'NEXT_PUBLIC_NETWORK_NAME=mainnet' \
          > app/bridge/.env

    - name: Build and push UI
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./app/bridge/Dockerfile
        platforms: linux/amd64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/bridge-ui:buildcache
        cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}/bridge-ui:buildcache,mode=max
        provenance: false

  build-server:
    name: Build Bridge Server
    runs-on: lux-build
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_PREFIX }}/bridge-server
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Server
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./app/server/Dockerfile
        platforms: linux/amd64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/bridge-server:buildcache
        cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}/bridge-server:buildcache,mode=max
        provenance: false

  deploy:
    name: Deploy to lux-k8s
    runs-on: lux-build
    needs: [build-ui, build-server]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: read

    steps:
    - name: Install doctl
      uses: digitalocean/action-doctl@v2
      with:
        token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

    - name: Install kubectl
      run: |
        mkdir -p $HOME/bin
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl && mv kubectl $HOME/bin/kubectl
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Configure kubectl
      run: doctl kubernetes cluster kubeconfig save lux-k8s --expiry-seconds 600

    - name: Restart bridge deployments
      run: |
        kubectl rollout restart deployment/bridge-ui -n lux-bridge
        kubectl rollout restart deployment/bridge-server -n lux-bridge
        kubectl rollout status deployment/bridge-ui -n lux-bridge --timeout=300s
        kubectl rollout status deployment/bridge-server -n lux-bridge --timeout=300s
