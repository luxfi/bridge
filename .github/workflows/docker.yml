name: Docker
on:
  workflow_dispatch:
  push:
    branches: [main, dev, test]
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  docker:
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ghcr.io/luxfi/bridge
            dockerfile: Dockerfile
            context: .
          - image: ghcr.io/luxfi/bridge/server
            dockerfile: app/server/Dockerfile
            context: .
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ${{ matrix.image }}
      dockerfile: ${{ matrix.dockerfile }}
      context: ${{ matrix.context }}
    secrets: inherit

  notify-universe:
    needs: docker
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.UNIVERSE_PAT }}
          repository: luxfi/universe
          event-type: image-published
          client-payload: |
            {
              "service": "bridge",
              "image": "ghcr.io/luxfi/bridge",
              "tag": "${{ github.ref_name }}",
              "sha": "${{ github.sha }}"
            }
