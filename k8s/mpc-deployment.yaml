# MPC Node StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mpc-node
  namespace: lux-bridge
spec:
  serviceName: mpc-node
  replicas: 5
  selector:
    matchLabels:
      app: mpc-node
  template:
    metadata:
      labels:
        app: mpc-node
    spec:
      initContainers:
      - name: setup-identity
        image: alpine:latest
        command: ["/bin/sh", "-c"]
        args:
        - |
          IDX=$(hostname | sed 's/mpc-node-//')
          NODE_NAME="node${IDX}"
          echo "Setting up identity for ${NODE_NAME}"
          mkdir -p /app/identity
          cp /config/config.yaml /app/config.yaml
          cp /config/peers.json /app/peers.json
          # Copy ALL node identities (needed for verifying peer messages)
          for i in 0 1 2; do
            cp /config/node${i}_identity.json /app/identity/node${i}_identity.json
          done
          # Copy own private key
          cp /keys/${NODE_NAME}_private.key /app/identity/${NODE_NAME}_private.key
          chmod 600 /app/identity/${NODE_NAME}_private.key
          echo "Identity setup complete for ${NODE_NAME}"
        volumeMounts:
        - name: app-dir
          mountPath: /app
        - name: mpc-config
          mountPath: /config
        - name: mpc-keys
          mountPath: /keys
      containers:
      - name: mpc
        image: ghcr.io/luxfi/mpc:latest
        command: ["/bin/sh", "-c"]
        args:
        - |
          IDX=$(hostname | sed 's/mpc-node-//')
          NODE_NAME="node${IDX}"
          echo "Starting MPC node: ${NODE_NAME}"
          cd /app && exec mpcd start -n "${NODE_NAME}"
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9090
          name: grpc
        env:
        - name: LOG_LEVEL
          value: debug
        volumeMounts:
        - name: app-dir
          mountPath: /app
        - name: mpc-data
          mountPath: /data
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: app-dir
        emptyDir: {}
      - name: mpc-config
        configMap:
          name: mpc-config
      - name: mpc-keys
        secret:
          secretName: mpc-identity-keys
  volumeClaimTemplates:
  - metadata:
      name: mpc-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mpc-node
  namespace: lux-bridge
spec:
  selector:
    app: mpc-node
  clusterIP: None
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  - port: 9090
    targetPort: 9090
    name: grpc
---
# Bridge Server Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bridge-server
  namespace: lux-bridge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bridge-server
  template:
    metadata:
      labels:
        app: bridge-server
    spec:
      containers:
      - name: bridge
        image: ghcr.io/luxfi/bridge-server:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: production
        - name: PORT
          value: "3000"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: bridge-secrets
              key: database-url
        - name: NATS_URL
          value: nats://nats:4222
        - name: CONSUL_URL
          value: http://consul:8500
        - name: NODE_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: MPC_THRESHOLD
          value: "3"
        - name: MPC_TOTAL_NODES
          value: "5"
        - name: MPC_TOTAL_NODES
          value: "3"
        - name: MPC_KEY_PREFIX
          value: bridge/mpc
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: bridge-server
  namespace: lux-bridge
spec:
  selector:
    app: bridge-server
  ports:
  - port: 3000
    targetPort: 3000
    name: http
  type: LoadBalancer
---
# Bridge UI Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bridge-ui
  namespace: lux-bridge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bridge-ui
  template:
    metadata:
      labels:
        app: bridge-ui
    spec:
      containers:
      - name: ui
        image: ghcr.io/luxfi/bridge-ui:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NEXT_PUBLIC_BRIDGE_API
          value: https://bridge-api.lux.network
        - name: NEXT_PUBLIC_BACKEND_API
          value: https://bridge-api.lux.network
        - name: NEXT_PUBLIC_IDENTITY_API
          value: https://bridge-api.lux.network
        - name: NEXT_PUBLIC_EXPLORER_API
          value: https://bridge-api.lux.network
        - name: NEXT_PUBLIC_NETWORK_NAME
          value: mainnet
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: bridge-ui
  namespace: lux-bridge
spec:
  selector:
    app: bridge-ui
  ports:
  - port: 80
    targetPort: 3000
    name: http
  type: LoadBalancer
---
# PostgreSQL StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: lux-bridge
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_USER
          value: bridge
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bridge-secrets
              key: postgres-password
        - name: POSTGRES_DB
          value: bridge
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "bridge"]
          initialDelaySeconds: 30
          periodSeconds: 10
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: lux-bridge
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
---
# Secrets
apiVersion: v1
kind: Secret
metadata:
  name: bridge-secrets
  namespace: lux-bridge
type: Opaque
stringData:
  database-url: "postgresql://bridge:bridge@postgres:5432/bridge"
  postgres-password: "bridge"
---
# PersistentVolumeClaim for NATS
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nats-pvc
  namespace: lux-bridge
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bridge-ingress
  namespace: lux-bridge
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - bridge.lux.network
    - bridge-api.lux.network
    secretName: bridge-lux-tls
  - hosts:
    - bridge.pars.network
    secretName: bridge-pars-tls
  - hosts:
    - bridge.hanzo.ai
    secretName: bridge-hanzo-tls
  - hosts:
    - bridge.zoo.ngo
    secretName: bridge-zoo-tls
  rules:
  # Lux Network (primary)
  - host: bridge.lux.network
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bridge-ui
            port:
              number: 80
  - host: bridge-api.lux.network
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bridge-server
            port:
              number: 3000
  # Pars Network — white-label, same bridge-ui backend
  - host: bridge.pars.network
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bridge-ui
            port:
              number: 80
  # Hanzo — white-label
  - host: bridge.hanzo.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bridge-ui
            port:
              number: 80
  # Zoo — white-label
  - host: bridge.zoo.ngo
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bridge-ui
            port:
              number: 80