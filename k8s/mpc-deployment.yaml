apiVersion: v1
kind: Namespace
metadata:
  name: lux-bridge
---
# KV Store — hanzoai/kv (Redis/Valkey)
# Used for session caching and bridge state. Replaces legacy NATS/Consul.
# MPC nodes use consensus mode (ZAP p2p) and do NOT need NATS or Consul.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kv
  namespace: lux-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kv
  template:
    metadata:
      labels:
        app: kv
    spec:
      containers:
      - name: kv
        image: hanzoai/kv:latest
        ports:
        - containerPort: 6379
          name: redis
        volumeMounts:
        - name: kv-storage
          mountPath: /data
        livenessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: kv-storage
        persistentVolumeClaim:
          claimName: kv-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: kv
  namespace: lux-bridge
spec:
  selector:
    app: kv
  ports:
  - port: 6379
    targetPort: 6379
    name: redis
---
# MPC Config
apiVersion: v1
kind: ConfigMap
metadata:
  name: mpc-config
  namespace: lux-bridge
data:
  config.yaml: |
    nats:
      url: nats://nats:4222
    consul:
      address: consul:8500
    environment: mainnet
    mpc_threshold: 3
    mpc_total_nodes: 5
    # badger_password is injected via ZAPDB_PASSWORD env var from mpc-secrets k8s Secret (KMS-managed)
    event_initiator_pubkey: "c3f3511cd2f849fd61e81ea62a842fd33367ee8fb5b867bb900877c7fb72ce3b"
    max_concurrent_keygen: 3
    db_path: /data/mpc
    backup_enabled: true
    backup_period_seconds: 300
    backup_dir: /data/mpc/backups
  peers.json: |
    {
      "node0": "0ce02715-0ead-48ef-9772-2583316cc860",
      "node1": "c95c340e-5a18-472d-b9b0-5ac68218213a",
      "node2": "ac37e85f-caca-4bee-8a3a-49a0fe35abff",
      "node3": "ee42a050-c1e8-4875-ae03-4260047666ff",
      "node4": "f67ec0b6-5a2f-410b-b43b-800b99315b41"
    }
  node0_identity.json: |
    {"node_name":"node0","node_id":"0ce02715-0ead-48ef-9772-2583316cc860","public_key":"96e47112bab4cb83e59a0a222964fad096f02a9dc52e449097f8991470a141ab"}
  node1_identity.json: |
    {"node_name":"node1","node_id":"c95c340e-5a18-472d-b9b0-5ac68218213a","public_key":"d49b5caace90b8317accd728b7b4419baef2ff32a164411d9ac7c1f703e13f7e"}
  node2_identity.json: |
    {"node_name":"node2","node_id":"ac37e85f-caca-4bee-8a3a-49a0fe35abff","public_key":"e0a570f5e7b52f76ba54aca0578dcd0c7f6569b7640027664af5be2ba8f0cf49"}
  node3_identity.json: |
    {"node_name":"node3","node_id":"ee42a050-c1e8-4875-ae03-4260047666ff","public_key":"a0082b30a0c5598b0d4d998e80866a6b7d1c4c66d0d8d907fd64ada5dceddd8b"}
  node4_identity.json: |
    {"node_name":"node4","node_id":"f67ec0b6-5a2f-410b-b43b-800b99315b41","public_key":"9f387cbaba446ffc05d69cc5cd2f35ed82531b860ceae0febc25560251fcdd36"}
---
# IMPORTANT: mpc-identity-keys is managed externally via KMS (kms.hanzo.ai).
# Keys are stored in KMS under: MPC_NODE{0,1,2}_PRIVATE_KEY and MPC_INITIATOR_KEY
# Apply with:
#   kubectl create secret generic mpc-identity-keys -n lux-bridge \
#     --from-literal="node0_private.key=$(kms get MPC_NODE0_PRIVATE_KEY)" \
#     --from-literal="node1_private.key=$(kms get MPC_NODE1_PRIVATE_KEY)" \
#     --from-literal="node2_private.key=$(kms get MPC_NODE2_PRIVATE_KEY)" \
#     --from-literal="initiator.key=$(kms get MPC_INITIATOR_KEY)" \
#     --dry-run=client -o yaml | kubectl apply -f -
# DO NOT add secret values here — never commit keys to git.
---
# MPC Node StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mpc-node
  namespace: lux-bridge
spec:
  serviceName: mpc-node
  replicas: 5
  selector:
    matchLabels:
      app: mpc-node
  template:
    metadata:
      labels:
        app: mpc-node
    spec:
      initContainers:
      - name: setup-identity
        image: alpine:latest
        command: ["/bin/sh", "-c"]
        args:
        - |
          IDX=$(hostname | sed 's/mpc-node-//')
          NODE_NAME="node${IDX}"
          echo "Setting up identity for ${NODE_NAME}"
          mkdir -p /app/identity
          cp /config/config.yaml /app/config.yaml
          cp /config/peers.json /app/peers.json
          # Copy ALL node identities (needed for verifying peer messages)
          for i in 0 1 2 3 4; do
            cp /config/node${i}_identity.json /app/identity/node${i}_identity.json
          done
          # Copy own private key
          cp /keys/${NODE_NAME}_private.key /app/identity/${NODE_NAME}_private.key
          chmod 600 /app/identity/${NODE_NAME}_private.key
          echo "Identity setup complete for ${NODE_NAME}"
        volumeMounts:
        - name: app-dir
          mountPath: /app
        - name: mpc-config
          mountPath: /config
        - name: mpc-keys
          mountPath: /keys
      containers:
      - name: mpc
        image: ghcr.io/luxfi/mpc:latest
        command: ["/bin/sh", "-c"]
        args:
        - |
          IDX=$(hostname | sed 's/mpc-node-//')
          NODE_NAME="node${IDX}"
          echo "Starting MPC node: ${NODE_NAME}"
          cd /app && exec mpcd start -n "${NODE_NAME}"
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9090
          name: grpc
        env:
        - name: LOG_LEVEL
          value: info
        - name: ZAPDB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bridge-secrets
              key: mpc-db-password
        - name: MPC_THRESHOLD
          value: "3"
        - name: MPC_TOTAL_NODES
          value: "5"
        volumeMounts:
        - name: app-dir
          mountPath: /app
        - name: mpc-data
          mountPath: /data
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: app-dir
        emptyDir: {}
      - name: mpc-config
        configMap:
          name: mpc-config
      - name: mpc-keys
        secret:
          secretName: mpc-identity-keys
  volumeClaimTemplates:
  - metadata:
      name: mpc-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mpc-node
  namespace: lux-bridge
spec:
  selector:
    app: mpc-node
  clusterIP: None
  ports:
  - port: 9651
    targetPort: 9651
    name: zap
  - port: 8080
    targetPort: 8080
    name: api
---
# MPC API service — bridge-server uses MPC_URL=http://mpc-api-svc.lux-bridge.svc:8081
# mpcd listens on :8080 (--api flag); port 8081 is exposed for external callers
apiVersion: v1
kind: Service
metadata:
  name: mpc-api-svc
  namespace: lux-bridge
spec:
  selector:
    app: mpc-node
  ports:
  - port: 8081
    targetPort: 8080
    name: api
---
# Bridge Server Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bridge-server
  namespace: lux-bridge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bridge-server
  template:
    metadata:
      labels:
        app: bridge-server
    spec:
      containers:
      - name: bridge
        image: ghcr.io/luxfi/bridge-server:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: production
        - name: PORT
          value: "3000"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: bridge-secrets
              key: database-url
        - name: NATS_URL
          value: nats://nats:4222
        - name: CONSUL_URL
          value: http://consul:8500
        - name: NODE_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: MPC_THRESHOLD
          value: "3"
        - name: MPC_TOTAL_NODES
          value: "5"
        - name: MPC_KEY_PREFIX
          value: bridge/mpc
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: bridge-server
  namespace: lux-bridge
spec:
  selector:
    app: bridge-server
  ports:
  - port: 3000
    targetPort: 3000
    name: http
  type: LoadBalancer
---
# Bridge UI Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bridge-ui
  namespace: lux-bridge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bridge-ui
  template:
    metadata:
      labels:
        app: bridge-ui
    spec:
      containers:
      - name: ui
        image: ghcr.io/luxfi/bridge-ui:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NEXT_PUBLIC_BRIDGE_API
          value: https://bridge-api.lux.network
        - name: NEXT_PUBLIC_BACKEND_API
          value: https://bridge-api.lux.network
        - name: NEXT_PUBLIC_IDENTITY_API
          value: https://bridge-api.lux.network
        - name: NEXT_PUBLIC_EXPLORER_API
          value: https://bridge-api.lux.network
        - name: NEXT_PUBLIC_NETWORK_NAME
          value: mainnet
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: bridge-ui
  namespace: lux-bridge
spec:
  selector:
    app: bridge-ui
  ports:
  - port: 80
    targetPort: 3000
    name: http
  type: LoadBalancer
---
# PostgreSQL StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: lux-bridge
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: ghcr.io/hanzoai/sql:17-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_USER
          value: bridge
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bridge-secrets
              key: postgres-password
        - name: POSTGRES_DB
          value: bridge
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "bridge"]
          initialDelaySeconds: 30
          periodSeconds: 10
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: lux-bridge
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
---
# bridge-secrets is managed externally via KMS (kms.hanzo.ai).
# Secrets stored in KMS: BRIDGE_DATABASE_URL, BRIDGE_DB_PASSWORD, MPC_DB_PASSWORD
# Apply with:
#   kubectl create secret generic bridge-secrets -n lux-bridge \
#     --from-literal="database-url=$(kms get BRIDGE_DATABASE_URL)" \
#     --from-literal="postgres-password=$(kms get BRIDGE_DB_PASSWORD)" \
#     --from-literal="mpc-db-password=$(kms get MPC_DB_PASSWORD)" \
#     --dry-run=client -o yaml | kubectl apply -f -
# DO NOT add secret values here — never commit credentials to git.
---
# PersistentVolumeClaim for KV store
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kv-pvc
  namespace: lux-bridge
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bridge-ingress
  namespace: lux-bridge
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: ingress
  tls:
  - hosts:
    - bridge.lux.network
    - bridge-api.lux.network
    secretName: bridge-lux-tls
  - hosts:
    - bridge.pars.network
    secretName: bridge-pars-tls
  - hosts:
    - bridge.hanzo.ai
    secretName: bridge-hanzo-tls
  - hosts:
    - bridge.zoo.ngo
    secretName: bridge-zoo-tls
  rules:
  # Lux Network (primary)
  - host: bridge.lux.network
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bridge-ui
            port:
              number: 80
  - host: bridge-api.lux.network
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bridge-server
            port:
              number: 3000
  # Pars Network — white-label, same bridge-ui backend
  - host: bridge.pars.network
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bridge-ui
            port:
              number: 80
  # Hanzo — white-label
  - host: bridge.hanzo.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bridge-ui
            port:
              number: 80
  # Zoo — white-label
  - host: bridge.zoo.ngo
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bridge-ui
            port:
              number: 80