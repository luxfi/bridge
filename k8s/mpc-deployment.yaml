data:
  config.yaml: |
    lux_rpc: https://api.lux.network/ext/bc/C/rpc
    zoo_rpc: https://api.zoo.network/ext/bc/C/rpc
    opnet_rpc: https://opnet.lux.network/rpc
    teleporter_address: ""
    lux_chain_id: 96369
    zoo_chain_id: 200200
    opnet_chain_id: 4294967299
    poll_interval_seconds: 12
    confirmations: 6
    health_port: 8080
---
# OPNET Watcher Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opnet-watcher
  namespace: lux-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opnet-watcher
  template:
    metadata:
      labels:
        app: opnet-watcher
    spec:
      containers:
      - name: opnet-watcher
        image: ghcr.io/luxfi/opnet-watcher:latest
        args: ["--config", "/config/config.yaml"]
        ports:
        - containerPort: 8080
          name: health
        - containerPort: 8090
          name: api
        env:
        - name: MPC_API_URL
          value: http://mpc-api-svc.lux-bridge.svc:8081
        - name: MPC_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: bridge-secrets
              key: mpc-api-token
        - name: KMS_KEY_SHARES
          valueFrom:
            secretKeyRef:
              name: opnet-watcher-secrets
              key: kms-key-shares
        - name: BRIDGE_TENANT_DIR
          value: /etc/bridge/tenants
        - name: BRIDGE_CHAIN_DIR
          value: /etc/bridge/chains
        volumeMounts:
        - name: config
          mountPath: /config
          readOnly: true
        - name: tenants
          mountPath: /etc/bridge/tenants
          readOnly: true
        - name: chains
          mountPath: /etc/bridge/chains
          readOnly: true
        livenessProbe:
          httpGet:
            path: /health
            port: 8090
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8090
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
      volumes:
      - name: config
        configMap:
          name: opnet-watcher-config
      - name: tenants
        configMap:
          name: bridge-tenants
      - name: chains
        configMap:
          name: bridge-chains
---
# opnet-watcher-secrets is managed externally via KMS (kms.hanzo.ai).
# Apply with:
#   kubectl create secret generic opnet-watcher-secrets -n lux-bridge \
#     --from-literal="kms-key-shares=$(kms get OPNET_WATCHER_KMS_KEY_SHARES)" \
#     --dry-run=client -o yaml | kubectl apply -f -
# DO NOT add secret values here -- never commit keys to git.
---
apiVersion: v1
kind: Service
metadata:
  name: opnet-watcher
  namespace: lux-bridge
spec:
  selector:
    app: opnet-watcher
  ports:
  - port: 8080
    targetPort: 8080
    name: health
  - port: 8090
    targetPort: 8090
    name: api