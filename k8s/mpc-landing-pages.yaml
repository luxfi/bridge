---
# Nginx config — hostname-based routing, single port
apiVersion: v1
kind: ConfigMap
metadata:
  name: mpc-nginx-conf
  namespace: lux-bridge
data:
  default.conf: |
    server {
        listen 80 default_server;
        server_name _;

        set $brand "lux";
        if ($host ~* "pars") {
            set $brand "pars";
        }

        root /usr/share/nginx/$brand;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /health {
            return 200 "ok";
            add_header Content-Type text/plain;
        }
    }
---
# Nginx deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mpc-landing
  namespace: lux-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mpc-landing
  template:
    metadata:
      labels:
        app: mpc-landing
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
          name: http
        volumeMounts:
        - name: lux-html
          mountPath: /usr/share/nginx/lux
        - name: pars-html
          mountPath: /usr/share/nginx/pars
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "50m"
      volumes:
      - name: lux-html
        configMap:
          name: mpc-lux-landing
      - name: pars-html
        configMap:
          name: mpc-pars-landing
      - name: nginx-conf
        configMap:
          name: mpc-nginx-conf
---
# Single service for all MPC landing pages
apiVersion: v1
kind: Service
metadata:
  name: mpc-landing
  namespace: lux-bridge
spec:
  selector:
    app: mpc-landing
  ports:
  - port: 80
    targetPort: 80
    name: http
---
# Single Ingress — add new domains by adding rules (no new resources needed)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mpc-landing
  namespace: lux-bridge
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: ingress
  rules:
  - host: mpc.lux.network
    http:
      paths:
      - backend:
          service:
            name: mpc-landing
            port:
              number: 80
        path: /
        pathType: Prefix
  - host: mpc.pars.network
    http:
      paths:
      - backend:
          service:
            name: mpc-landing
            port:
              number: 80
        path: /
        pathType: Prefix
  tls:
  - hosts:
    - mpc.lux.network
    secretName: mpc-lux-network-tls
  - hosts:
    - mpc.pars.network
    secretName: mpc-pars-network-tls
