    <header>
    <div class="container">
      <a href="/" class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="24" height="24"><circle cx="25" cy="25" r="22" fill="none" stroke="#fff" stroke-width="3"/><text x="25" y="32" text-anchor="middle" fill="#fff" font-size="24" font-weight="700" font-family="-apple-system,sans-serif">P</text></svg>
